name: Oatly Alert

concurrency:
  group: oatly-alert
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      force_test_message:
        description: "Testnachricht an Telegram senden"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: read

jobs:
  check-oatly:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v5

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: state.json aus Cache wiederherstellen
        id: cache-state-restore
        uses: actions/cache/restore@v5
        with:
          path: state.json
          key: oatly-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            oatly-state-${{ github.ref_name }}-

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Oatly-Angebote pruefen
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PRICE_THRESHOLD: ${{ vars.PRICE_THRESHOLD }}
          FORCE_TEST_MESSAGE: ${{ inputs.force_test_message || 'false' }}
        run: python src/check_oatly.py

      - name: state.json im Cache speichern
        if: always() && hashFiles('state.json') != ''
        uses: actions/cache/save@v5
        with:
          path: state.json
          key: oatly-state-${{ github.ref_name }}-${{ github.run_id }}
